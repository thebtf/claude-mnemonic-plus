syntax = "proto3";

package engram.v1;

option go_package = "github.com/thebtf/engram/proto/engram/v1;engramv1";

// EngramService provides MCP tool access via gRPC.
// The daemon connects to this service and translates MCP JSON-RPC to gRPC calls.
service EngramService {
  // CallTool dispatches a single MCP tool call.
  // Generic: tool_name + JSON args, matching the MCP tools/call pattern.
  rpc CallTool(CallToolRequest) returns (CallToolResponse);

  // Initialize returns server info and the list of available tools.
  rpc Initialize(InitializeRequest) returns (InitializeResponse);

  // Ping is a lightweight health check.
  rpc Ping(PingRequest) returns (PingResponse);

  // ---- Phase B additions ---------------------------------------------

  // SyncProjectState reconciles the daemon's local project registry
  // against the server's authoritative list. Called by the daemon every
  // 60 s as a heartbeat. The response drives ProjectRemovalAware fan-out
  // for any project the daemon tracks locally but the server no longer
  // knows about. Idempotent — multiple daemons can call concurrently.
  rpc SyncProjectState(SyncProjectStateRequest) returns (SyncProjectStateResponse);

  // ProjectEvents pushes project-lifecycle events in real time. Server-
  // streaming RPC; the stream stays open for the daemon's lifetime.
  // Delivery is at-least-once; the daemon is responsible for dedup.
  rpc ProjectEvents(ProjectEventsRequest) returns (stream ProjectEvent);
}

// ---- SyncProjectState messages ----------------------------------------

message SyncProjectStateRequest {
  // local_project_ids is the set of ProjectContext.ID values the daemon
  // currently tracks (one entry per connected CC session). Order is not
  // significant. Max 10 000 entries (server enforces the cap via
  // INVALID_ARGUMENT).
  repeated string local_project_ids = 1;

  // client_id uniquely identifies this daemon instance for audit logging.
  // Typically `${daemon_pid}-${daemon_start_unix}`.
  string client_id = 2;
}

message SyncProjectStateResponse {
  // removed lists project IDs that the daemon has locally but the server
  // has no record of (removed_at IS NOT NULL or not in table). The daemon
  // fans these out to every registered ProjectRemovalAware module.
  repeated string removed = 1;

  // unknown lists project IDs that the server HAS a record of but that
  // look orphaned (last heartbeat > 24h ago AND removed_at IS NULL). The
  // daemon MAY log these for operator attention but does NOT fan them out
  // — only `removed` is authoritative.
  repeated string unknown = 2;

  // server_time_unix_ms is the server's wall clock at the time the
  // response was built. The daemon uses it for clock-skew detection.
  int64 server_time_unix_ms = 3;
}

// ---- ProjectEvents messages -------------------------------------------

message ProjectEventsRequest {
  // client_id uniquely identifies this daemon instance for audit logging.
  // Same format as SyncProjectStateRequest.client_id.
  string client_id = 1;

  // since_event_id allows the daemon to resume from a specific event after
  // reconnection. Empty string means "start from now; no replay".
  //
  // In v0.1.0 the server is NOT required to persist events for replay —
  // this field is reserved for forward compatibility. A v0.1.0 server
  // that receives a non-empty since_event_id MUST return OUT_OF_RANGE.
  string since_event_id = 2;
}

message ProjectEvent {
  // event_id is a monotonically increasing server-side identifier for this
  // event. Opaque to the daemon; used only for since_event_id replay.
  string event_id = 1;

  // event_type is the canonical event category. v0.1.0 only emits
  // PROJECT_EVENT_TYPE_REMOVED; the field is forward-compatible via the
  // ProjectEventType enum below.
  ProjectEventType event_type = 2;

  // project_id is the canonical muxcore ProjectContext.ID value.
  string project_id = 3;

  // timestamp_unix_ms is the server-side wall clock when the event was
  // generated.
  int64 timestamp_unix_ms = 4;

  // reason is a free-form server-provided explanation (e.g. "dashboard
  // operator removed", "retention policy expired").
  string reason = 5;

  // metadata is a key-value map for forward-compatible extension. v0.1.0
  // does NOT define any required keys.
  map<string, string> metadata = 6;
}

enum ProjectEventType {
  PROJECT_EVENT_TYPE_UNSPECIFIED = 0;
  PROJECT_EVENT_TYPE_REMOVED     = 1;
  PROJECT_EVENT_TYPE_CREATED     = 2; // reserved for v0.2.0
  PROJECT_EVENT_TYPE_RENAMED     = 3; // reserved for v0.2.0
}

// CallToolRequest carries an MCP tool invocation.
message CallToolRequest {
  // MCP tool name (e.g., "store_memory", "recall", "search").
  string tool_name = 1;
  // Tool arguments as JSON bytes (same as MCP JSON-RPC params.arguments).
  bytes arguments_json = 2;
  // Project identity for scope isolation (from git-derived slug).
  string project = 3;
  // Claude session ID for tracking and outcome propagation.
  string session_id = 4;
}

// CallToolResponse carries the result of an MCP tool call.
message CallToolResponse {
  // True if the tool returned an error result.
  bool is_error = 1;
  // Tool result as JSON bytes (MCP content array serialized).
  bytes content_json = 2;
}

// InitializeRequest is the handshake from daemon to server.
message InitializeRequest {
  string client_name = 1;
  string client_version = 2;
  string project = 3;
}

// InitializeResponse carries server capabilities and tool definitions.
message InitializeResponse {
  string server_name = 1;
  string server_version = 2;
  repeated ToolDefinition tools = 3;
}

// ToolDefinition describes a single MCP tool.
message ToolDefinition {
  string name = 1;
  string description = 2;
  // JSON Schema for the tool's input parameters.
  bytes input_schema_json = 3;
}

message PingRequest {}

message PingResponse {
  string status = 1;
}
